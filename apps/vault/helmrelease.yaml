apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 10m
  chart:
    spec:
      chart: vault
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vault
      version: "0.27.0"
  values:
    server:
      dataStorage:
        enabled: true
        size: 5Gi
        storageClass: "nfs-client"
      ingress:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/hostname: vault.api-api-api.com
        hosts:
          - host: vault.api-api-api.com
            paths: []
        tls:
          - hosts:
              - vault.api-api-api.com
            secretName: vault-tls-secret
    ui:
      enabled: true
