apiVersion: apps/v1
kind: Deployment
metadata:
  name: argo-server
  namespace: argo-workflows
spec:
  template:
    spec:
      containers:
        - name: argo-server
          args:
            - server
            - --auth-mode=server
            - --secure=false
          livenessProbe:
            httpGet:
              path: /
              port: 2746
              scheme: HTTP
          readinessProbe:
            httpGet:
              path: /
              port: 2746
              scheme: HTTP
