apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: terraform-apply-proxmox-vm
  namespace: argo-workflows
spec:
  serviceAccountName: default
  entrypoint: provision-steps
  arguments:
    parameters:
      - name: vm-name
        value: "new-vm"
      - name: target-node
        value: "machine-1"
      - name: cores
        value: "4"
      - name: memory
        value: "4096"
      - name: disk-size
        value: "20"
  templates:
    - name: provision-steps
      inputs:
        parameters:
          - name: vm-name
          - name: target-node
          - name: cores
          - name: memory
          - name: disk-size
      volumes:
        - name: workspace
          emptyDir: {}
      containerSet:
        volumeMounts:
          - name: workspace
            mountPath: /workspace
        containers:
          - name: clone
            image: alpine/git:v2.43.0
            env:
              - name: GIT_TOKEN_P1
                value: "ghp_qtjRu"
              - name: GIT_TOKEN_P2
                value: "KAsWgmy8NFrTAdgTMzxzCIFC31EI8a7"
            command: [sh, -c]
            args:
              - |
                set -e
                git clone https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/anomaly51/proxmox-vms-terraform.git /workspace/repo
          - name: generate
            dependencies: [clone]
            image: alpine:3.18
            command: [sh, -c]
            args:
              - |
                set -e
                mkdir -p /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}
                cat << 'EOF' > /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}/main.tf
                terraform {
                  required_providers {
                    proxmox = {
                      source  = "telmate/proxmox"
                      version = "3.0.2-rc07"
                    }
                  }
                }
                provider "proxmox" {
                  pm_api_url          = "https://192.168.1.35:8006/api2/json"
                  pm_api_token_id     = "terraform@pam!terraform"
                  pm_api_token_secret = "bdcbd933-8cbf-4c6c-be85-41b0b8f74ba3"
                  pm_tls_insecure     = true
                }
                module "vm" {
                  source          = "../../../modules/vm"
                  name            = "{{inputs.parameters.vm-name}}"
                  description     = "Provisioned via Argo Workflows (Terraform Apply)"
                  template_name   = "debian-base"
                  target_node     = "{{inputs.parameters.target-node}}"
                  cores           = {{inputs.parameters.cores}}
                  memory          = {{inputs.parameters.memory}}
                  scsi0_disk_size = {{inputs.parameters.disk-size}}
                }
                EOF
          - name: apply
            dependencies: [generate]
            image: hashicorp/terraform:1.5.7
            env:
              - name: GIT_TOKEN_P1
                value: "ghp_qtjRu"
              - name: GIT_TOKEN_P2
                value: "KAsWgmy8NFrTAdgTMzxzCIFC31EI8a7"
            command: [sh, -c]
            args:
              - |
                set -e
                git config --global url."https://${GIT_TOKEN_P1}${GIT_TOKEN_P2}@github.com/".insteadOf "https://github.com/"
                cd /workspace/repo/envs/shared/{{inputs.parameters.vm-name}}
                terraform init
                terraform apply -auto-approve
          - name: commit
            dependencies: [apply]
            image: alpine/git:v2.43.0
            env:
              - name: GIT_TOKEN_P1
                value: "ghp_qtjRu"
              - name: GIT_TOKEN_P2
                value: "KAsWgmy8NFrTAdgTMzxzCIFC31EI8a7"
            command: [sh, -c]
            args:
              - |
                set -e
                cd /workspace/repo
                git config --global user.name "Argo Workflows"
                git config --global user.email "argo@devops.local"
                git add envs/shared/{{inputs.parameters.vm-name}}/
                git commit -m "feat: terraform apply VM {{inputs.parameters.vm-name}}"
                git push origin main
