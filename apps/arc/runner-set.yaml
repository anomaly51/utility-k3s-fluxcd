apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: anomaly51-runner
  namespace: arc-runners
spec:
  interval: 10m
  chart:
    spec:
      chart: gha-runner-scale-set
      sourceRef:
        kind: HelmRepository
        name: arc-charts
        namespace: arc-systems
      version: "*"
  values:
    githubConfigUrl: "https://github.com/anomaly51"
    githubConfigSecret: arc-github-token

