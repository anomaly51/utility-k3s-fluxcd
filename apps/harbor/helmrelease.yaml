apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor-system
spec:
  interval: 10m
  chart:
    spec:
      chart: harbor
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: harbor-system
      version: "*"
  values:
    harborAdminPassword: "StrongPassword123!"
    externalURL: https://harbor.api-api-api.com
    expose:
      type: ingress
      tls:
        enabled: true
        certSource: secret
        secret:
          secretName: harbor-tls-secret
      ingress:
        hosts:
          core: harbor.api-api-api.com
        className: "traefik"
        annotations:
          cert-manager.io/cluster-issuer: letsencrypt-production
          external-dns.alpha.kubernetes.io/hostname: harbor.api-api-api.com
          external-dns.alpha.kubernetes.io/ttl: "120"
    persistence:
      enabled: true
      persistentVolumeClaim:
        registry:
          size: 10Gi
        database:
          size: 2Gi
        redis:
          size: 1Gi
        trivy:
          size: 2Gi
    trivy:
      enabled: true
