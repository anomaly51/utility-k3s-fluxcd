apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cert-manager-issuers
  namespace: flux-system
spec:
  dependsOn:
    - name: flux-system
  interval: 1m
  retryInterval: 1m
  path: ./apps/cert-manager-issuers
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
